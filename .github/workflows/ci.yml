name: Monk Platform CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:

jobs:

  test:

    runs-on: windows-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup PowerShell
        uses: actions/setup-powershell@v2

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module Pester -Force -SkipPublisherCheck

      - name: Run Tests
        shell: pwsh
        run: |
          ./tests/Run-Tests.ps1